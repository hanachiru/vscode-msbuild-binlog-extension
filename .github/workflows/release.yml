name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: Semantic version part to increment
        required: true
        default: patch
        type: choice
        options:
          - major
          - minor
          - patch
      manual_marketplace_upload:
        description: Skip VSCode Marketplace publish
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.MARKETPLACE_ACCESS_TOKEN }}

    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.BOT_CLIENT_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Check out repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install npm dependencies
        run: npm ci

      - name: Bump version
        id: release_version
        run: |
          npm version "${{ inputs.version_bump }}" --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "vsix=msbuild-binlog-viewer-$VERSION.vsix" >> "$GITHUB_OUTPUT"

      - name: Compile extension
        run: npm run compile

      - name: Build helper
        run: npm run compile:helper

      - name: Package extension
        run: npm exec -- @vscode/vsce package --out "${{ steps.release_version.outputs.vsix }}"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: msbuild-binlog-viewer-vsix
          path: ${{ steps.release_version.outputs.vsix }}

      - name: Commit and push release
        shell: bash
        run: |
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

          git add package.json package-lock.json
          git commit -m "Release ${{ steps.release_version.outputs.value }}"
          git tag "${{ steps.release_version.outputs.tag }}"
          git push origin "HEAD:${{ github.ref_name }}" "refs/tags/${{ steps.release_version.outputs.tag }}"

      - name: Publish GitHub release
        id: draft_release
        uses: release-drafter/release-drafter@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-name: release-drafter.yml
          version: ${{ steps.release_version.outputs.version }}
          tag: ${{ steps.release_version.outputs.tag }}
          name: ${{ steps.release_version.outputs.version }}
          publish: true

      - name: Publish extension
        if: ${{ !inputs.manual_marketplace_upload }}
        run: npm exec -- @vscode/vsce publish --packagePath "${{ steps.release_version.outputs.vsix }}" --pat "$VSCE_PAT" --skip-duplicate